apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
spec:
  ingressClassName: nginx
  rules:
  - host: grafana.127.0.0.1.sslip.io
    http:
      paths:
      - backend:
          service:
            name: grafana-stack
            port:
              number: 80
        path: /
        pathType: Prefix
