apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sdenydeploymentinprodnamespaces
spec:
  crd:
    spec:
      names:
        kind: K8sDenyDeploymentInProdNamespaces
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sdenydeploymentinprodnamespaces

        violation[{"msg": msg}] {
          # 1. Ensure we are looking at a Deployment
          input.review.kind.kind == "Deployment"
          
          # 2. Get the name of the target namespace
          ns_name := input.review.object.metadata.namespace
          
          # 3. Look up the namespace in Gatekeeper's cached inventory
          # Note: This requires Namespace syncing to be enabled (see step 3 below)
          ns := data.inventory.cluster["v1"]["Namespace"][ns_name]
          
          # 4. Check for the specific annotation
          ns.metadata.annotations["teams.example.com/created-by"] == "teams-operator"
          
          msg := sprintf("Deployments are forbidden in namespace %v because it is managed by 'teams-operator'.", [ns_name])
        }


